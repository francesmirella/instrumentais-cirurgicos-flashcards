<body>
<div class="app">
  <h1>Síntese - Classificação de Fios</h1>
  <p class="subtitle">Jogo para treinar origem, absorção, estrutura e uso principal dos fios.</p>

  <div class="topbar">
    <a class="btn" href="flashcards.html">← Voltar para Instrumentais</a>
    <a class="btn" href="qual-e-o-sinal.html">Qual é o Sinal?</a>
    <a class="btn" href="simulacao-completa.html">Simulação Completa</a>
    <button class="btn" type="button" onclick="showStart()">Reiniciar</button>
  </div>

  <div class="stats" id="stats"></div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="card" id="card"></div>
</div>

<script>
const fios = [
  {
    nome: "Catgut Simples",
    imagem: "",
    origem: "Animal (colágeno intestinal ovino/bovino)",
    absorcao: "Absorvível (proteólise enzimática; força ~7–10 dias; absorção completa ~60–70 dias)",
    estrutura: "Multifilamentar torcido",
    uso: "Ligaduras, mucosa e submucosa, peritônio"
  },
  {
    nome: "Catgut Cromado",
    imagem: "",
    origem: "Animal (tratado com sais de cromo)",
    absorcao: "Absorvível (força ~14–21 dias; absorção ~90 dias)",
    estrutura: "Multifilamentar torcido",
    uso: "Subcutâneo, ginecologia (útero/cúpula vaginal), urologia (bexiga)"
  },
  {
    nome: "Polyglactina 910 (Vicryl®)",
    imagem: "",
    origem: "Sintética (ácido glicólico + ácido láctico)",
    absorcao: "Absorvível por hidrólise (força 3–4 semanas; absorção 56–70 dias)",
    estrutura: "Multifilamentar trançado e revestido",
    uso: "Submucosa, músculo, peritônio, anastomoses gastrointestinais"
  },
  {
    nome: "Vicryl Rapid",
    imagem: "",
    origem: "Sintética",
    absorcao: "Absorvível (rápida)",
    estrutura: "Multifilamentar trançado",
    uso: "Pele, episiorrafia, pequenos procedimentos superficiais"
  },
  {
    nome: "Vicryl Plus",
    imagem: "",
    origem: "Sintética (com revestimento antibacteriano)",
    absorcao: "Absorvível por hidrólise",
    estrutura: "Multifilamentar trançado e revestido",
    uso: "Mesmos usos do Vicryl, preferido em locais com maior risco de infecção"
  },
  {
    nome: "Poliglicólico (Dexon®)",
    imagem: "",
    origem: "Sintética",
    absorcao: "Absorvível por hidrólise (56–70 dias)",
    estrutura: "Multifilamentar trançado",
    uso: "Peritônio, subcutâneo, músculo"
  },
  {
    nome: "Poliglecaprona (Monocryl®)",
    imagem: "",
    origem: "Sintética",
    absorcao: "Absorvível por hidrólise (perde força em 2–3 semanas; absorção ~90 dias)",
    estrutura: "Monofilamentar",
    uso: "Intradérmico, subcutâneo, cirurgia plástica"
  },
  {
    nome: "Polidioxanona (PDS)",
    imagem: "",
    origem: "Sintética",
    absorcao: "Absorvível por hidrólise (longa duração)",
    estrutura: "Monofilamentar",
    uso: "Aponeurose, parede abdominal, anastomoses profundas, transplantes"
  },
  {
    nome: "Gliconato (Maxon)",
    imagem: "",
    origem: "Sintética",
    absorcao: "Absorvível por hidrólise (longa sustentação)",
    estrutura: "Monofilamentar",
    uso: "Tecidos sob tensão, parede abdominal, situações que exigem longa sustentação"
  },
  {
    nome: "Polipropileno (Prolene®)",
    imagem: "",
    origem: "Sintética",
    absorcao: "Não absorvível",
    estrutura: "Monofilamentar",
    uso: "Anastomoses vasculares, aponeurose, cirurgia cardiovascular"
  },
  {
    nome: "Náilon (Poliamida)",
    imagem: "",
    origem: "Sintética",
    absorcao: "Não absorvível (perda lenta de força ao longo dos anos)",
    estrutura: "Monofilamentar ou multifilamentar",
    uso: "Pele, microanastomoses, oftalmologia"
  },
  {
    nome: "Seda",
    imagem: "",
    origem: "Animal (fibroína do Bombyx mori)",
    absorcao: "Não absorvível funcional (perde força progressivamente)",
    estrutura: "Multifilamentar trançado ou torcido",
    uso: "Ligaduras e procedimentos sem grande tensão"
  },
  {
    nome: "Algodão",
    imagem: "",
    origem: "Vegetal",
    absorcao: "Não absorvível",
    estrutura: "Multifilamentar torcido",
    uso: "Ligaduras"
  },
  {
    nome: "Linho",
    imagem: "",
    origem: "Vegetal",
    absorcao: "Não absorvível",
    estrutura: "Multifilamentar torcido",
    uso: "Ligaduras"
  },
  {
    nome: "Poliéster (Ethibond)",
    imagem: "",
    origem: "Sintética",
    absorcao: "Não absorvível",
    estrutura: "Multifilamentar trançado",
    uso: "Ortopedia, fixação tendínea, estruturas sob alta tensão"
  },
  {
    nome: "PTFE",
    imagem: "",
    origem: "Sintética",
    absorcao: "Não absorvível",
    estrutura: "Monofilamentar",
    uso: "Cirurgia vascular e reconstruções delicadas"
  },
  {
    nome: "Aço cirúrgico",
    imagem: "",
    origem: "Metálica",
    absorcao: "Não absorvível",
    estrutura: "Monofilamentar ou multifilamentar",
    uso: "Ortopedia, fixação esternal, estruturas ósseas"
  }
];

const roundsTotal = fios.length;
let round = 0;
let score = 0;
let currentQuestion = null;
let waitingNext = false;
let roundFios = [];

function shuffle(array) {
  const copy = [...array];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function pickDifferentValues(field, correctValue) {
  const universe = Array.from(new Set(fios.map((item) => item[field]))).filter((v) => v !== correctValue);
  return shuffle(universe).slice(0, 3);
}

function origemDireta(origem) {
  if (origem.startsWith("Animal")) return "Animal";
  if (origem.startsWith("Sintética")) return "Sintética";
  if (origem.startsWith("Metálica")) return "Metálica";
  if (origem.startsWith("Vegetal")) return "Vegetal";
  return "Outra";
}

function absorcaoDireta(absorcao) {
  return absorcao.startsWith("Não absorvível") ? "Não absorvível" : "Absorvível";
}

function estruturaDireta(estrutura) {
  const e = estrutura.toLowerCase();
  if (e.includes("monofilamentar ou multifilamentar")) return "Mono e multi";
  if (e.includes("monofilamentar")) return "Monofilamentar";
  if (e.includes("multifilamentar")) return "Multifilamentar";
  return "Outra";
}

function buildVisualHtml(fio) {
  if (fio.imagem && fio.imagem.trim()) {
    const safe = fio.imagem.replace(/'/g, "\\'");
    return `<div class="visual"><img src="${fio.imagem}" alt="${fio.nome}" onerror="this.parentElement.textContent='${fio.nome}'; this.remove();" data-src="${safe}"></div>`;
  }
  return `<div class="visual">Foto do fio (opcional)</div>`;
}

function buildQuestion(fio) {
  const type = Math.floor(Math.random() * 3);

  if (type === 0) {
    const correct = origemDireta(fio.origem);
    return {
      fio,
      prompt: "Qual origem?",
      correct,
      options: shuffle(["Animal", "Sintética", "Metálica", "Vegetal"])
    };
  }

  if (type === 1) {
    const correct = absorcaoDireta(fio.absorcao);
    return {
      fio,
      prompt: "Absorvível ou não absorvível?",
      correct,
      options: shuffle(["Absorvível", "Não absorvível"])
    };
  }

  const correct = estruturaDireta(fio.estrutura);
  return {
    fio,
    prompt: "Mono ou multi?",
    correct,
    options: shuffle(["Monofilamentar", "Multifilamentar", "Mono e multi"])
  };
}

function updateStats() {
  const high = Number(localStorage.getItem("sinteseHighScore") || 0);
  document.getElementById("stats").innerHTML = `
    <span>Rodada: ${Math.min(round + 1, roundsTotal)}/${roundsTotal}</span>
    <span>Pontuação: ${score}</span>
    <span>Recorde: ${high}</span>
  `;
}

function updateProgress() {
  const progress = (round / roundsTotal) * 100;
  document.getElementById("progressBar").style.width = `${Math.max(0, Math.min(100, progress)).toFixed(1)}%`;
}

function showStart() {
  round = 0;
  score = 0;
  waitingNext = false;
  updateStats();
  updateProgress();

  document.getElementById("card").innerHTML = `
    <h2 class="question">Jogo de Síntese</h2>
    <p class="subtitle">Treine a classificação dos fios com perguntas direcionadas.</p>
    <button class="btn primary" type="button" onclick="startGame()">Iniciar Jogo</button>
  `;
}

function startGame() {
  round = 0;
  score = 0;
  roundFios = shuffle([...fios]);
  nextQuestion();
}

function nextQuestion() {
  if (round >= roundsTotal) {
    showFinal();
    return;
  }

  waitingNext = false;
  const fio = roundFios[round % roundFios.length];
  currentQuestion = buildQuestion(fio);
  updateStats();
  updateProgress();

  document.getElementById("card").innerHTML = `
    ${buildVisualHtml(currentQuestion.fio)}
    <h3 class="fio-name">Fio: ${currentQuestion.fio.nome}</h3>
    <h2 class="question">${currentQuestion.prompt}</h2>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <div class="next-wrap"><button class="btn hidden" id="nextBtn" type="button" onclick="advanceRound()">Próxima</button></div>
  `;

  const optionsEl = document.getElementById("options");
  currentQuestion.options.forEach((option) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "option-btn";
    btn.textContent = option;
    btn.onclick = () => checkAnswer(btn, option);
    optionsEl.appendChild(btn);
  });
}

function checkAnswer(button, selected) {
  if (waitingNext) return;
  waitingNext = true;

  const feedback = document.getElementById("feedback");
  document.querySelectorAll(".option-btn").forEach((b) => b.disabled = true);

  if (selected === currentQuestion.correct) {
    score += 1;
    button.classList.add("correct");
    feedback.textContent = "✔ Correto!";
  } else {
    button.classList.add("wrong");
    feedback.textContent = `✖ Resposta correta: ${currentQuestion.correct}`;
    document.querySelectorAll(".option-btn").forEach((b) => {
      if (b.textContent === currentQuestion.correct) b.classList.add("correct");
    });
  }

  document.getElementById("nextBtn").classList.remove("hidden");
  updateStats();
}

function advanceRound() {
  round += 1;
  nextQuestion();
}

function showFinal() {
  const high = Number(localStorage.getItem("sinteseHighScore") || 0);
  const newHigh = Math.max(high, score);
  localStorage.setItem("sinteseHighScore", String(newHigh));

  updateStats();
  updateProgress();
  document.getElementById("progressBar").style.width = "100%";

  const percentage = ((score / roundsTotal) * 100).toFixed(1);
  document.getElementById("card").innerHTML = `
    <h2 class="question">Resultado Final</h2>
    <p class="subtitle">Você acertou ${score} de ${roundsTotal} (${percentage}%).</p>
    <p class="subtitle">Recorde: ${newHigh}</p>
    <div class="topbar topbar-center topbar-mt-8">
      <button class="btn primary" type="button" onclick="startGame()">Jogar Novamente</button>
      <a class="btn" href="flashcards.html">Voltar para Instrumentais</a>
    </div>
  `;
}

showStart();
</script>
</body>
</html>
