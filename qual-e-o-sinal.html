<body>
<div class="app">
  <h1>Qual é o Sinal?</h1>
  <p class="subtitle">Veja o nome do instrumento e escolha o gesto correto entre 4 opções.</p>

  <div class="topbar">
    <a class="btn" href="flashcards.html">← Voltar para Instrumentais</a>
    <a class="btn" href="sintese.html">Síntese</a>
    <a class="btn" href="simulacao-completa.html">Simulação Completa</a>
    <button class="btn" type="button" onclick="showStart()">Reiniciar</button>
  </div>

  <div class="stats" id="stats"></div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="card" id="card"></div>
</div>

<script>
const sinais = [
  { instrumento: "Bisturi", gesto: "Lápis / violino: mão em pinça fina simulando empunhadura do bisturi." },
  { instrumento: "Tesoura Curva", gesto: "Indicador e médio simulando tesoura com trajetória curva." },
  { instrumento: "Tesoura Reta", gesto: "Indicador e médio paralelos simulando tesoura em corte reto." },
  { instrumento: "Pinça Anatômica", gesto: "Pinça fina: polegar e indicador aproximados sem dente." },
  { instrumento: "Pinça Dente de Rato", gesto: "Pinça fina com 'dente': gesto de pinça com ponta em gancho." },
  { instrumento: "Gaze", gesto: "Mão em concha com movimento curto de limpeza." },
  { instrumento: "Compressa", gesto: "Mãos abertas formando apoio amplo para compressa." },
  { instrumento: "Fio para Ligadura", gesto: "Gesto de laço/círculo com os dedos para ligadura." },
  { instrumento: "Pinça Hemostática", gesto: "Pinça com trava: fechar e simular travamento da cremalheira." },
  { instrumento: "Porta Agulha", gesto: "Pinça firme de punho, simulando preensão de agulha." },
  { instrumento: "Farabeuf", gesto: "Dois dedos em gancho retraindo lateralmente." },
  { instrumento: "Doyen", gesto: "Palma em curva ampla para afastamento profundo." },
  { instrumento: "Gosset", gesto: "Duas mãos afastando em autoestático bilateral." },
  { instrumento: "Backaus", gesto: "Pinça pontiaguda de campo: pinçar e fixar os panos." }
];

const roundsTotal = sinais.length;
let round = 0;
let score = 0;
let currentQuestion = null;
let waitingNext = false;
let order = [];

function shuffle(array) {
  const copy = [...array];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function buildOptions(correctGesto) {
  const distractors = shuffle(sinais.map((item) => item.gesto).filter((gesto) => gesto !== correctGesto)).slice(0, 3);
  return shuffle([correctGesto, ...distractors]);
}

function updateStats() {
  const high = Number(localStorage.getItem("sinalHighScore") || 0);
  document.getElementById("stats").innerHTML = `
    <span>Rodada: ${Math.min(round + 1, roundsTotal)}/${roundsTotal}</span>
    <span>Pontuação: ${score}</span>
    <span>Recorde: ${high}</span>
  `;
}

function updateProgress() {
  const progress = (round / roundsTotal) * 100;
  document.getElementById("progressBar").style.width = `${Math.max(0, Math.min(100, progress)).toFixed(1)}%`;
}

function showStart() {
  round = 0;
  score = 0;
  waitingNext = false;
  order = shuffle([...sinais]);
  updateStats();
  updateProgress();

  document.getElementById("card").innerHTML = `
    <h2 class="question">Treino de sinal cirúrgico</h2>
    <p class="subtitle">Você verá o nome do instrumento e escolherá o gesto correto.</p>
    <button class="btn primary" type="button" onclick="startGame()">Iniciar Jogo</button>
  `;
}

function startGame() {
  round = 0;
  score = 0;
  order = shuffle([...sinais]);
  nextQuestion();
}

function nextQuestion() {
  if (round >= roundsTotal) {
    showFinal();
    return;
  }

  waitingNext = false;
  const item = order[round];
  currentQuestion = {
    instrumento: item.instrumento,
    correct: item.gesto,
    options: buildOptions(item.gesto)
  };

  updateStats();
  updateProgress();

  document.getElementById("card").innerHTML = `
    <h3 class="instrument-name">Instrumento: ${currentQuestion.instrumento}</h3>
    <h2 class="question">Qual é o sinal?</h2>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <div class="next-wrap"><button class="btn hidden" id="nextBtn" type="button" onclick="advanceRound()">Próxima</button></div>
  `;

  const optionsEl = document.getElementById("options");
  currentQuestion.options.forEach((option) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "option-btn";
    btn.textContent = option;
    btn.onclick = () => checkAnswer(btn, option);
    optionsEl.appendChild(btn);
  });
}

function checkAnswer(button, selected) {
  if (waitingNext) return;
  waitingNext = true;

  const feedback = document.getElementById("feedback");
  document.querySelectorAll(".option-btn").forEach((b) => b.disabled = true);

  if (selected === currentQuestion.correct) {
    score += 1;
    button.classList.add("correct");
    feedback.textContent = "✔ Correto!";
  } else {
    button.classList.add("wrong");
    feedback.textContent = `✖ Resposta correta: ${currentQuestion.correct}`;
    document.querySelectorAll(".option-btn").forEach((b) => {
      if (b.textContent === currentQuestion.correct) b.classList.add("correct");
    });
  }

  document.getElementById("nextBtn").classList.remove("hidden");
  updateStats();
}

function advanceRound() {
  round += 1;
  nextQuestion();
}

function showFinal() {
  const high = Number(localStorage.getItem("sinalHighScore") || 0);
  const newHigh = Math.max(high, score);
  localStorage.setItem("sinalHighScore", String(newHigh));

  updateStats();
  updateProgress();
  document.getElementById("progressBar").style.width = "100%";

  const percentage = ((score / roundsTotal) * 100).toFixed(1);
  document.getElementById("card").innerHTML = `
    <h2 class="question">Resultado Final</h2>
    <p class="subtitle">Você acertou ${score} de ${roundsTotal} (${percentage}%).</p>
    <p class="subtitle">Recorde: ${newHigh}</p>
    <div class="topbar topbar-center topbar-mt-8">
      <button class="btn primary" type="button" onclick="startGame()">Jogar Novamente</button>
      <a class="btn" href="flashcards.html">Voltar para Instrumentais</a>
    </div>
  `;
}

showStart();
</script>
</body>
